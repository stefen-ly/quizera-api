spring:
  main:
    allow-bean-definition-overriding: true

  application:
    name: project

  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/quizera_db011}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:1929}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:8084}